services:
  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - prowlarr-config:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  bot:
    build: ./bot
    container_name: telegram-book-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PROWLARR_URL=http://prowlarr:9696
      - PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - ALLOWED_USER_IDS=${ALLOWED_USER_IDS}
      - ANNA_ARCHIVE_URL=${ANNA_ARCHIVE_URL}
      - BOOKS_DOWNLOAD_PATH=${BOOKS_DOWNLOAD_PATH:-/downloads/books}
      - DOWNLOAD_TIMEOUT_MINUTES=${DOWNLOAD_TIMEOUT_MINUTES:-15}
      - LOCAL_API_SERVER=http://telegram-bot-api:8081
    depends_on:
      - prowlarr
      - telegram-bot-api
    restart: unless-stopped

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      - TELEGRAM_API_ID=${LOCAL_API_ID}
      - TELEGRAM_API_HASH=${LOCAL_API_HASH}
      - TELEGRAM_LOCAL=true
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api

volumes:
  prowlarr-config:
  telegram-bot-api-data:
